name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        env:
          SESSION_SECRET: ci-test-secret
        run: python -m pytest tests/ -q

  frontend:
    name: Frontend syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-check JS
        run: |
          node --check scanner-app/app.js
          node --check scanner-app/sw.js
          node --check dashboard-app/dashboard.js
          node --check public/signup.js
