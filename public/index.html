<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Carte de Fidélité</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF7B00;
            --bg-color: #0F0F13;
            --surface: rgba(255, 255, 255, 0.05);
            --text-main: #FFFFFF;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 400px;
            background: var(--surface);
            padding: 30px 20px; border-radius: 24px;
            text-align: center;
        }
        h1 { margin-top: 0; font-size: 24px; }
        .input-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 14px; margin-bottom: 6px; color: #A0A0A5; }
        input {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: white;
            box-sizing: border-box; font-size: 16px;
        }
        button {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--primary), #E66A00);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            margin-top: 10px;
        }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 12px; }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; color: #A0A0A5; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; margin-top: 0;}
        .tab.active { background: var(--surface); color: white; }
        .gpay-btn {
            background: black; color: white;
            border: 1px solid #333; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Créez votre carte</h1>
        <p style="color: #A0A0A5; font-size: 14px; margin-bottom: 24px;">Remplissez vos informations pour obtenir votre carte de fidélité digitale.</p>
        
        <div class="tabs">
            <button id="tab-signup" class="tab active" onclick="switchTab('signup')">Nouvelle Carte</button>
            <button id="tab-login" class="tab" onclick="switchTab('login')">J'ai déjà une carte</button>
        </div>

        <form id="signup-form">
            <div class="input-group">
                <label>Prénom</label>
                <input type="text" id="first-name" required placeholder="Jean">
            </div>
            <div class="input-group">
                <label>Nom</label>
                <input type="text" id="last-name" required placeholder="Dupont">
            </div>
            <div class="input-group">
                <label id="pin-label">Choisissez un Code PIN (4 chiffres)</label>
                <input type="text" id="pin-code" required placeholder="1234" pattern="\d{4}" maxlength="4" inputmode="numeric">
            </div>
            <div id="error-message" style="color: #FF5252; font-size: 14px; margin-bottom: 10px; display: none;"></div>
            <button type="submit" id="submit-btn">Générer ma carte</button>
        </form>

        <div id="success-area" class="hidden" style="margin-top: 20px;">
            <a id="wallet-link" href="#" target="_blank" style="text-decoration: none;">
                <button class="gpay-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white">
                        <path d="M21 4H3C1.89 4 1 4.89 1 6v12c0 1.11.89 2 2 2h18c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H3V6h18v12zm-9-8h9v2h-9zm0 4h9v2h-9z"/>
                    </svg>
                    Ajouter à Google Wallet
                </button>
            </a>
            <p style="font-size: 12px; color: #A0A0A5; margin-top: 15px;">Cliquez sur le bouton ci-dessus pour enregistrer votre carte.</p>
        </div>
    </div>

    <script src="signup.js"></script>
</body>
</html>
