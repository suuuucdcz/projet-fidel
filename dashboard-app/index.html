<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agence Dashboard</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF9800">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container { padding-bottom: 20px; max-width: 900px; margin: 0 auto; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        
        .merchant-card { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--surface-border); }
        .merchant-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .merchant-title { font-size: 20px; font-weight: bold; color: var(--primary); }
        
        .offer-form { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 8px; }
        .offer-form input { flex: 1; font-size: 14px; padding: 10px; }
        .offer-form button { width: auto; padding: 10px 20px; font-size: 14px; }

        /* Tabbed offer editor */
        .offer-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
        .offer-tab { width: auto; padding: 8px 16px; font-size: 13px; font-weight: 600; background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--surface-border); border-radius: 8px; cursor: pointer; transition: 0.15s; }
        .offer-tab.active { background: var(--primary); color: #000; border-color: var(--primary); }
        .offer-pane { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; }

        /* Reusable bits (extracted from inline styles) */
        .field-label { display: block; font-size: 12px; color: gray; margin-bottom: 4px; }
        .chip-btn { width: max-content; padding: 4px 8px; border-radius: 4px; cursor: pointer;
                    font-size: 11px; font-weight: bold; transition: 0.2s; white-space: nowrap;
                    background: transparent; text-decoration: none; }
        .qr-btn { color: var(--primary); border: 1px solid var(--primary); }
        .qr-btn:hover { background: var(--primary); color: #000; }
        .danger-btn { color: #ff4444; border: 1px solid #ff4444; }
        .danger-btn:hover { background: #ff4444; color: #fff; }

        /* Live card preview (Design tab) */
        .offer-row { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 20px; }
        .offer-row .offer-form { margin-bottom: 0; }
        .card-preview { flex: 1 1 250px; min-width: 230px; }
        .cp-card { border-radius: 16px; padding: 16px; color: #fff; box-shadow: 0 8px 24px rgba(0,0,0,0.4); overflow: hidden; transition: background 0.15s; }
        .cp-head { display: flex; align-items: center; gap: 10px; }
        .cp-logo { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: rgba(255,255,255,0.25); flex-shrink: 0; }
        .cp-issuer { font-size: 13px; font-weight: 600; opacity: 0.95; }
        .cp-cardtitle { font-size: 14px; font-weight: 600; opacity: 0.95; }
        .cp-header { font-size: 26px; font-weight: 800; margin-top: 12px; line-height: 1.1; word-break: break-word; }
        .cp-subheader { font-size: 13px; opacity: 0.85; margin-top: 4px; }
        .cp-hero { margin: 14px -16px -16px; overflow: hidden; }
        .cp-hero img { width: 100%; height: 92px; object-fit: cover; display: block; }
        .cp-caption { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 8px; }
        .img-status { font-size: 11px; margin-top: 4px; min-height: 14px; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid var(--surface-border); font-size: 14px; }
        th { background: rgba(0,0,0,0.4); color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
        
        .badge { display: inline-block; white-space: nowrap; background: var(--accent); color: white; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-container dashboard-container">
        <div class="nav-header">
            <div class="logo-area">
                <h1>Fidélité<span>Agency</span></h1>
            </div>
        </div>

        <div class="glass-panel" style="margin-bottom: 20px;">
            <h2 style="margin-bottom: 10px;">Ajouter un Commerçant</h2>
            <form id="create-merchant-form" class="offer-form" style="background: rgba(255,255,255,0.05);">
                <input type="text" id="new_merchant_name" placeholder="Nom de la boutique (ex: Boulangerie Paul)" required>
                <input type="email" id="new_merchant_email" placeholder="Email (Identifiant)" required>
                <input type="password" id="new_merchant_password" placeholder="Mot de passe" required>
                <button type="submit" class="btn-primary">Créer le compte</button>
            </form>
            <div id="create-msg" style="color: var(--success); font-size: 14px; margin-top: 10px; display: none;">Compte créé avec succès !</div>
            <div id="create-error" style="color: red; font-size: 14px; margin-top: 10px; display: none;"></div>
        </div>

        <div class="glass-panel">
            <h2 style="margin-bottom: 5px;">Tous vos Commerçants</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">Gérez les offres de fidélité, consultez les clients et l'historique d'activité.</p>
            
            <div id="merchants-list">
                <!-- Injected via JS -->
                <div style="text-align: center; padding: 40px; color: gray;">Chargement...</div>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
