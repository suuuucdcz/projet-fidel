<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Fidélité</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF9800">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192.png?text=LMC">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- HTML5 QRCode library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <h1>Fidélité<span>Pro</span></h1>
            </div>
            <p class="subtitle">Scanner de comptoir</p>
        </header>

        <!-- Login Section -->
        <section id="login-section" class="glass-panel">
            <h2>Connexion Commerçant</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="nom@commerce.com">
                </div>
                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">Se connecter</button>
            </form>
            <div id="login-error" class="error-msg hidden"></div>
        </section>

        <!-- Scanner Section -->
        <section id="scanner-section" class="glass-panel hidden">
            <div class="scanner-header">
                <h2>Scanner une carte</h2>
                <button id="logout-btn" class="btn-text">Déconnexion</button>
            </div>
            
            <div id="reader" class="scanner-view"></div>
            
            <div id="scan-result" class="result-card hidden">
                <div class="success-checkmark">
                    <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                        <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                        <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                    </svg>
                </div>
                <h3>Point Validé !</h3>
                <p id="points-status">Nouveau solde: X points</p>
                <button id="next-scan-btn" class="btn-secondary">Scanner le suivant</button>
            </div>
        </section>
        
        <!-- Push Marketing Section -->
        <section id="push-section" class="glass-panel hidden">
            <h2>Campagne Push</h2>
            <form id="push-form">
                <div class="input-group">
                    <label for="push-header">Titre de l'offre</label>
                    <input type="text" id="push-header" required placeholder="Ex: -50% ce soir !">
                </div>
                <div class="input-group">
                    <label for="push-body">Message</label>
                    <textarea id="push-body" required placeholder="Ex: Venez profiter de nos invendus..."></textarea>
                </div>
                <button type="submit" class="btn-accent">Envoyer à tous les clients</button>
            </form>
        </section>
        
        <nav id="bottom-nav" class="bottom-nav hidden">
            <button id="nav-scanner" class="nav-item active">Scanner</button>
            <button id="nav-push" class="nav-item">Push Marketing</button>
        </nav>
    </div>

    <!-- JS -->
    <script src="app.js"></script>
</body>
</html>
